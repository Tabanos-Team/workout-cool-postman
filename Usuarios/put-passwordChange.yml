info:
  name: put-passwordChange
  type: http
  seq: 5

http:
  method: PUT
  url: "{{URLBaseApi}}/user/password"
  body:
    type: json
    data: |-
      {
          "currentPassword":"456264123",
          "newPassword":"Workout2026!",
          "confirmPassword":"Workout2026!"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const body = typeof res.body === "string" ? JSON.parse(res.body || "{}") : res.body;

        test("returns 200", function() {
          expect(res.status).to.equal(200);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Covers PUT /api/user/password (happy path).
  Preconditions: run Auth/Sign-in in the same Bruno execution first.
  WARNING: this request changes the test user's real password. It is NOT idempotent -
  running it twice in a row will fail on the second run because currentPassword no longer
  matches. Either reset the test user's password back to "456264123" after each run, or
  point currentPassword/newPassword at throwaway values before including this in a CI job.
