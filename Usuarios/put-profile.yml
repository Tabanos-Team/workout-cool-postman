info:
  name: put-profile
  type: http
  seq: 4

http:
  method: PUT
  url: "{{URLBaseApi}}/user/profile"
  body:
    type: json
    data: |-
      {
        "firstName": "Test1",
        "lastName": "tester"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const body = typeof res.body === "string" ? JSON.parse(res.body || "{}") : res.body;

        test("returns 200", function() {
          expect(res.status).to.equal(200);
        });

        test("profile reflects the updated fields", function() {
          expect(body).to.have.property("firstName", "Test1");
          expect(body).to.have.property("lastName", "tester");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Covers PUT /api/user/profile.
  Preconditions: run Auth/Sign-in in the same Bruno execution first.
