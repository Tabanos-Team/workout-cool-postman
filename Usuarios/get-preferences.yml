info:
  name: get-preferences
  type: http
  seq: 2

http:
  method: GET
  url: "{{URLBaseApi}}/user/preferences"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const body = typeof res.body === "string" ? JSON.parse(res.body || "{}") : res.body;

        test("returns 200", function() {
          expect(res.status).to.equal(200);
        });

        test("returns the preferences contract", function() {
          expect(body).to.have.property("fitnessLevel");
          expect(body).to.have.property("equipment").that.is.an("array");
          expect(body).to.have.property("weeklyFrequency");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Covers GET /api/user/preferences.
  Preconditions: run Auth/Sign-in in the same Bruno execution first.