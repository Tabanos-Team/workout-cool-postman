info:
  name: put-passwordChange-wrong-current
  type: http
  seq: 7

http:
  method: PUT
  url: "{{URLBaseApi}}/user/password"
  body:
    type: json
    data: |-
      {
          "currentPassword":"esta-password-no-es-correcta",
          "newPassword":"Workout2026!",
          "confirmPassword":"Workout2026!"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const body = typeof res.body === "string" ? JSON.parse(res.body || "{}") : res.body;

        test("rejects password change with wrong current password", function() {
          expect([400, 401, 403]).to.include(res.status);
        });

        test("returns an error payload", function() {
          expect(body).to.have.property("error").that.is.a("string").and.not.empty;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Negative case for PUT /api/user/password: wrong currentPassword must be rejected
  and must never change the real password. Safe to re-run repeatedly, unlike
  put-passwordChange.yml.
  Preconditions: run Auth/Sign-in in the same Bruno execution first.
