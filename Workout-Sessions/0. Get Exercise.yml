info:
  name: 0. Get Exercise
  type: http
  seq: 3

http:
  method: GET
  url: "{{URLBaseApi}}/exercises/all"
  auth: inherit

runtime:
  scripts:
    post-response: |-
      if (res.status === 200) {
        const body = res.body;
        if (body && body.data && body.data.length > 0) {
          bru.setVar("exerciseId", body.data[0].id);
        }
      }
      
      test("Status code is 200", function() {
        expect(res.status).to.equal(200);
      });
      test("Exercises list is not empty", function() {
        const body = res.body;
        expect(body.data).to.be.an("array");
        expect(body.data.length).to.be.above(0);
      });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
