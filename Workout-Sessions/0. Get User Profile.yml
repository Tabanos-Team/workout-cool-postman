info:
  name: 0. Get User Profile
  type: http
  seq: 2

http:
  method: GET
  url: "{{URLBaseApi}}/user/profile"
  auth: inherit

runtime:
  scripts:
    post-response: |-
      if (res.status === 200) {
        const body = res.body;
        if (body && body.user && body.user.id) {
          bru.setVar("userId", body.user.id);
        }
      }
      
      test("Status code is 200", function() {
        expect(res.status).to.equal(200);
      });
      test("Profile contains user ID", function() {
        const body = res.body;
        expect(body.user).to.be.an("object");
        expect(body.user.id).to.be.a("string");
      });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
