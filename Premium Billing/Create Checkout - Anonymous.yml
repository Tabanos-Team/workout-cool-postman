info:
  name: Create Checkout - Anonymous
  type: http
  seq: 10
  tags:
    - premium-billing
    - negative
    - auth-boundary

http:
  method: POST
  url: "{{URLBaseApi}}/premium/checkout"
  body:
    type: json
    data: |-
      {
        "planId": "{{PremiumPlanId}}",
        "provider": "{{PremiumProvider}}"
      }

runtime:
  scripts:
    - type: tests
      code: |-
        const body = typeof res.body === "string" ? JSON.parse(res.body || "{}") : res.body;

        test("rejects anonymous checkout attempt", function() {
          expect([401, 403]).to.include(res.status);
        });

        test("returns an error payload", function() {
          expect(body).to.have.property("error").that.is.a("string").and.not.empty;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Covers the auth boundary of POST /api/premium/checkout: no session cookie is sent,
  so an anonymous user must never be able to start a checkout. Run this request on
  its own or before Auth/Sign-in so no session is present.
