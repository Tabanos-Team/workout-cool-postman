info:
  name: Get Billing Status - Authenticated
  type: http
  seq: 8
  tags:
    - premium-billing
    - authenticated

http:
  method: GET
  url: "{{URLBaseApi}}/billing/status"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const body = typeof res.body === "string" ? JSON.parse(res.body || "{}") : res.body;

        test("authenticated billing status returns 200", function() {
          expect(res.status).to.equal(200);
        });

        test("returns billing status contract", function() {
          expect(body).to.have.property("isPremium").that.is.a("boolean");
          expect(body).to.have.property("canUpgrade").that.is.a("boolean");

          if (body.expiresAt !== undefined && body.expiresAt !== null) {
            expect(body.expiresAt).to.be.a("string");
          }

          if (body.subscription !== undefined) {
            expect(body.subscription).to.be.an("object");
          }

          if (body.license !== undefined) {
            expect(body.license).to.be.an("object");
          }
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Covers GET /api/billing/status with an authenticated Better Auth session.
  Run Auth/Sign-in in the same Bruno execution before this request.
