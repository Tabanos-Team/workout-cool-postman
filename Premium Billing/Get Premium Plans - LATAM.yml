info:
  name: Get Premium Plans - LATAM
  type: http
  seq: 1
  tags:
    - premium-billing
    - public
    - smoke

http:
  method: GET
  url: "{{URLBaseApi}}/premium/plans?provider={{PremiumProvider}}&region={{PremiumRegion}}"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = typeof res.body === "string" ? JSON.parse(res.body || "{}") : res.body;

        if (Array.isArray(body.plans) && body.plans.length > 0) {
          bru.setVar("PremiumPlanId", body.plans[0].id);
        }
    - type: tests
      code: |-
        const body = typeof res.body === "string" ? JSON.parse(res.body || "{}") : res.body;

        test("returns 200", function() {
          expect(res.status).to.equal(200);
        });

        test("returns a plans array and the requested region", function() {
          expect(body).to.have.property("plans").that.is.an("array");
          expect(body).to.have.property("detectedRegion", "LATAM");
        });

        test("plan payload has the premium contract when plans exist", function() {
          if (body.plans.length === 0) {
            return;
          }

          const plan = body.plans[0];
          expect(plan).to.include.keys(["id", "name", "type", "priceMonthly", "priceYearly", "currency", "features"]);
          expect(plan.type).to.equal("premium");
          expect(plan.features).to.be.an("array");
          expect(["EUR", "USD"]).to.include(plan.currency);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Covers GET /api/premium/plans using an explicit provider and LATAM region.
  The after-response script stores the first returned plan id as PremiumPlanId for checkout tests.
