info:
  name: "N03: POST /api/exercises/shuffle (invalid exerciseId - HTTP 404)"
  type: http
  seq: 103

http:
  method: POST
  url: "{{URLBaseApi}}/exercises/shuffle"
  body:
    type: json
    data: |-
      {
        "exerciseId": "00000000-0000-0000-0000-000000000000",
        "muscleGroups": ["chest"],
        "difficulty": "intermediate"
      }

runtime:
  scripts:
    - type: tests
      code: |-
        const body = typeof res.body === "string" ? JSON.parse(res.body || "{}") : res.body;

        test("returns 404 for non-existent exercise", function() {
          expect([404, 400]).to.include(res.status);
        });

        test("error indicates exercise not found", function() {
          expect(body).to.have.property("error");
          expect(body.error).to.be.a("string");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Negative case: POST /api/exercises/shuffle with non-existent exerciseId.
  Should return HTTP 404 with descriptive error message.
