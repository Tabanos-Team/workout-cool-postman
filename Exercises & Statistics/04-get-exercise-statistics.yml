info:
  name: GET /api/exercises/:id/statistics (general)
  type: http
  seq: 4

http:
  method: GET
  url: "{{URLBaseApi}}/exercises/{{exerciseId}}/statistics"
  auth: inherit

runtime:
  scripts:
    - type: pre-request
      code: |-
        if (!bru.getVar("exerciseId")) {
          throw new Error("exerciseId not set. Run GET /api/exercises/all first.");
        }

    - type: tests
      code: |-
        const body = typeof res.body === "string" ? JSON.parse(res.body || "{}") : res.body;

        test("returns 200 for valid exercise", function() {
          expect(res.status).to.equal(200);
        });

        test("returns general statistics structure", function() {
          expect(body).to.have.property("exerciseId").that.is.a("string");
          expect(body).to.have.property("totalReps").that.is.a("number");
          expect(body).to.have.property("totalSets").that.is.a("number");
          expect(body).to.have.property("totalVolume").that.is.a("number");
        });

        test("statistics are non-negative", function() {
          expect(body.totalReps).to.be.greaterThanOrEqual(0);
          expect(body.totalSets).to.be.greaterThanOrEqual(0);
          expect(body.totalVolume).to.be.greaterThanOrEqual(0);
        });

        test("contains average weight if sets exist", function() {
          if (body.totalSets > 0) {
            expect(body).to.have.property("avgWeight");
            expect(body.avgWeight).to.be.a("number");
            expect(body.avgWeight).to.be.greaterThanOrEqual(0);
          }
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Get general statistics for an exercise.
  
  Returns overall metrics:
  - totalReps: Total reps performed
  - totalSets: Total sets completed
  - totalVolume: Total volume (weight × reps × sets)
  - avgWeight: Average weight used
  - maxWeight: Maximum weight lifted
  - minWeight: Minimum weight lifted
  
  Authentication required (session/cookie).
  
  Precondition: exerciseId must be set.
