info:
  name: "N04: GET /api/exercises/:id/statistics (invalid ID - HTTP 404)"
  type: http
  seq: 104

http:
  method: GET
  url: "{{URLBaseApi}}/exercises/00000000-0000-0000-0000-000000000000/statistics"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const body = typeof res.body === "string" ? JSON.parse(res.body || "{}") : res.body;

        test("returns 404 for non-existent exercise", function() {
          // Could be 404 or 401 depending on auth check order
          expect([401, 404]).to.include(res.status);
        });

        test("error message indicates not found or unauthorized", function() {
          expect(body).to.have.property("error");
          const errorStr = typeof body.error === "string" ? body.error.toLowerCase() : "";
          // Either unauthorized (if auth checked first) or not found
          const isValid = errorStr.includes("not found") || errorStr.includes("unauthorized") || 
                         errorStr.includes("invalid");
          expect(isValid).to.be.true;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Negative case: GET /api/exercises/:id/statistics with non-existent ID.
  Should return HTTP 404 with descriptive error message.
  
  Authentication required.
