info:
  name: "N02: POST /api/exercises/shuffle (missing exerciseId - HTTP 400)"
  type: http
  seq: 102

http:
  method: POST
  url: "{{URLBaseApi}}/exercises/shuffle"
  body:
    type: json
    data: |-
      {
        "muscleGroups": ["chest"],
        "difficulty": "intermediate"
      }

runtime:
  scripts:
    - type: tests
      code: |-
        const body = typeof res.body === "string" ? JSON.parse(res.body || "{}") : res.body;

        test("returns 400 for missing exerciseId", function() {
          expect(res.status).to.equal(400);
        });

        test("error explains missing field", function() {
          expect(body).to.have.property("error");
          expect(body.error.toLowerCase()).to.include("exerciseid");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Negative case: POST /api/exercises/shuffle without required exerciseId field.
  Should return HTTP 400 with validation error.
