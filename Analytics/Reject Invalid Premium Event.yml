info:
  name: Reject Invalid Premium Event
  type: http
  seq: 6
  tags:
    - analytics
    - premium
    - negative

http:
  method: POST
  url: "{{URLBaseApi}}/analytics/premium"
  body:
    type: json
    data: |-
      {
        "event": "invalid_event"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const body = typeof res.body === "string" ? JSON.parse(res.body || "{}") : res.body;

        test("rejects invalid analytics event", function() {
          expect(res.status).to.equal(400);
          expect(body).to.have.property("error", "Invalid event type");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Negative integration test for event validation in POST /api/analytics/premium.
