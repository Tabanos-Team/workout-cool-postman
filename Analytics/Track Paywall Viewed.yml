info:
  name: Track Paywall Viewed
  type: http
  seq: 2
  tags:
    - analytics
    - premium

http:
  method: POST
  url: "{{URLBaseApi}}/analytics/premium"
  body:
    type: json
    data: |-
      {
        "event": "paywall_viewed"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const body = typeof res.body === "string" ? JSON.parse(res.body || "{}") : res.body;

        test("tracks paywall viewed event", function() {
          expect(res.status).to.equal(200);
          expect(body).to.include({
            event: "paywall_viewed",
            success: true
          });
        });

        test("maps paywall view to the premium channel", function() {
          expect(body.analyticsEvent).to.include({
            name: "Paywall Viewed",
            channel: "premium"
          });
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Covers POST /api/analytics/premium for the paywall_viewed event.
